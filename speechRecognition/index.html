<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="palette.css" />
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <title>Background</title>
</head>

<body>

  <svg id="scene-fixed" class="layer-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 576"
    preserveAspectRatio="xMidYMid slice">
    <g id="clouds-bg">
      <!-- Cloud 1 (Medium) -->
      <g class="cloud cloud-1">
        <g transform="translate(0, 40) scale(0.8)">
          <circle cx="40" cy="50" r="30" />
          <circle cx="80" cy="35" r="45" />
          <circle cx="130" cy="40" r="40" />
          <circle cx="175" cy="55" r="25" />
        </g>
      </g>
      <!-- Cloud 2 (Smallest, Slowest) -->
      <g class="cloud cloud-2">
        <g transform="translate(0, 120) scale(0.55)">
          <circle cx="40" cy="50" r="30" />
          <circle cx="80" cy="35" r="45" />
          <circle cx="130" cy="40" r="40" />
          <circle cx="175" cy="55" r="25" />
        </g>
      </g>
    </g>
    <g id="mountains-far"></g>
    <g id="mountains-near"></g>
    <g id="mountains-mid"></g>
    <g id="trees-mid"></g>
    <g id="mountains-front"></g>
    <g id="trees-front"></g>

    <g id="clouds-fg">
      <!-- Cloud 3 (Largest, Fastest, Foreground) -->
      <g class="cloud cloud-3">
        <g transform="translate(0, 10) scale(1.1)">
          <circle cx="40" cy="50" r="30" />
          <circle cx="80" cy="35" r="45" />
          <circle cx="130" cy="40" r="40" />
          <circle cx="175" cy="55" r="25" />
        </g>
      </g>
    </g>

    <!-- Mechanical Hand Character -->
    <g id="mechanical-hand" transform="translate(512, 576) scale(0.6)">
      <!-- Shoulders -->
      <path d="M -140,0 L -140,-50 Q -140,-110 -70,-110 L 70,-110 Q 140,-110 140,-50 L 140,0 Z" fill="var(--color-4)" />

      <!-- Neck -->
      <rect x="-40" y="-130" width="80" height="40" rx="5" fill="var(--color-12)" />

      <g id="upper-hand">
        <!-- Fingers -->
        <g id="hand-fingers">
          <!-- Pinky -->
          <g transform="translate(-60, -255) rotate(-20) scale(0.75)">
            <rect x="-6" y="-100" width="12" height="120" rx="6" fill="var(--color-12)" />
            <rect x="-14" y="-35" width="28" height="45" rx="6" fill="var(--color-2)" />
            <rect x="-13" y="-75" width="26" height="35" rx="6" fill="var(--color-2)" />
            <path d="M -12,-80 L 12,-80 L 10,-100 Q 5,-130 0,-130 Q -5,-130 -10,-100 Z" fill="var(--color-2)" />
          </g>
          <!-- Ring -->
          <g transform="translate(-25, -265) rotate(-8) scale(0.9)">
            <rect x="-6" y="-100" width="12" height="120" rx="6" fill="var(--color-12)" />
            <rect x="-14" y="-35" width="28" height="45" rx="6" fill="var(--color-2)" />
            <rect x="-13" y="-75" width="26" height="35" rx="6" fill="var(--color-2)" />
            <path d="M -12,-80 L 12,-80 L 10,-100 Q 5,-130 0,-130 Q -5,-130 -10,-100 Z" fill="var(--color-2)" />
          </g>
          <!-- Middle -->
          <g transform="translate(15, -268) rotate(2) scale(1.0)">
            <rect x="-6" y="-100" width="12" height="120" rx="6" fill="var(--color-12)" />
            <rect x="-14" y="-35" width="28" height="45" rx="6" fill="var(--color-2)" />
            <rect x="-13" y="-75" width="26" height="35" rx="6" fill="var(--color-2)" />
            <path d="M -12,-80 L 12,-80 L 10,-100 Q 5,-130 0,-130 Q -5,-130 -10,-100 Z" fill="var(--color-2)" />
          </g>
          <!-- Index -->
          <g transform="translate(55, -260) rotate(12) scale(0.85)">
            <rect x="-6" y="-100" width="12" height="120" rx="6" fill="var(--color-12)" />
            <rect x="-14" y="-35" width="28" height="45" rx="6" fill="var(--color-2)" />
            <rect x="-13" y="-75" width="26" height="35" rx="6" fill="var(--color-2)" />
            <path d="M -12,-80 L 12,-80 L 10,-100 Q 5,-130 0,-130 Q -5,-130 -10,-100 Z" fill="var(--color-2)" />
          </g>
          <!-- Thumb -->
          <g transform="translate(72, -180) rotate(60) scale(0.9)">
            <rect x="-6" y="-100" width="12" height="120" rx="6" fill="var(--color-12)" />
            <rect x="-14" y="-35" width="28" height="45" rx="6" fill="var(--color-2)" />
            <rect x="-13" y="-75" width="26" height="35" rx="6" fill="var(--color-2)" />
            <path d="M -12,-80 L 12,-80 L 10,-100 Q 5,-130 0,-130 Q -5,-130 -10,-100 Z" fill="var(--color-2)" />
          </g>
        </g>

        <!-- Palm Base -->
        <path d="M -50,-110 L -80,-250 Q -85,-270 -60,-270 L 60,-270 Q 85,-270 80,-250 L 50,-110 Z" fill="var(--color-2)" />

        <!-- Face -->
        <g id="character-face">
          <!-- Eyes -->
          <circle cx="-30" cy="-190" r="4" fill="var(--color-12)" />
          <circle cx="30" cy="-190" r="4" fill="var(--color-12)" />
          <!-- Smile -->
          <path id="character-mouth" d="M -13,-170 Q 0,-160 13,-170" stroke="var(--color-12)" stroke-width="3" stroke-linecap="round" fill="none" />
        </g>
      </g>
    </g>
  </svg>

  <svg id="scene-stretch" class="layer-svg" xmlns="http://www.w3.org/2000/svg">
    <g id="ground"></g>
  </svg>

  <!-- UI Overlay -->
  <div id="ui-overlay">
    <div class="ui-panel">
      <button id="connect-btn">Select Port</button>
    </div>

    <div class="ui-panel">
      <span class="label">Input Type</span>
      <div class="toggle-group">
        <button id="mode-voice" class="active">Voice</button>
        <button id="mode-text">Text</button>
      </div>

      <!-- Voice Container -->
      <div id="voice-container" class="input-container active-container" style="margin-top: 15px;">
        <button id="toggle-listen">Start Listening</button>
      </div>

      <!-- Text Container -->
      <div id="text-container" class="input-container" style="margin-top: 15px;">
        <input type="text" id="text-input" placeholder="type..." autocomplete="off" />
      </div>
    </div>

    <!-- Logs -->
    <div class="ui-panel" id="logs-container">
      <button class="collapsible-header" id="logs-toggle" aria-expanded="true">
        <span class="label">Logs</span>
        <span class="chevron" id="logs-chevron">&#9660;</span>
      </button>
      <div class="collapsible-body" id="logs-body">
        <div id="logs"></div>
      </div>
    </div>

    <div class="ui-panel" id="servo-panel">
      <button class="collapsible-header" id="servo-toggle" aria-expanded="true">
        <span class="label">Manual Servo Test</span>
        <span class="chevron" id="servo-chevron">&#9660;</span>
      </button>
      <div class="collapsible-body" id="servo-body">
      <div id="servo-rows"></div>
      </div><!-- end servo-body -->
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
