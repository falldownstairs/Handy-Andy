<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Background</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: #F5EDE0;
    }

    .layer-svg {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }

    @keyframes floatCloudsBg {
      from {
        transform: translateX(1050px);
      }

      to {
        transform: translateX(-150px);
      }
    }

    @keyframes floatCloudsMid {
      from {
        transform: translateX(1100px);
      }

      to {
        transform: translateX(-250px);
      }
    }

    @keyframes floatCloudsFg {
      from {
        transform: translateX(1200px);
      }

      to {
        transform: translateX(-300px);
      }
    }

    .cloud {
      fill: #FFFFFF;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      animation-duration: 60s;
    }

    .cloud-1 {
      animation-name: floatCloudsMid;
      animation-delay: 0s;
    }

    .cloud-2 {
      animation-name: floatCloudsBg;
      animation-delay: -20s;
    }

    .cloud-3 {
      animation-name: floatCloudsFg;
      animation-delay: -40s;
    }

    #ui-overlay {
      position: absolute;
      top: 75px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      max-width: 90vw;
      display: flex;
      flex-direction: column;
      gap: 15px;
      font-family: sans-serif;
      z-index: 10;
      pointer-events: auto;
    }

    .ui-panel {
      background-color: rgba(245, 237, 224, 0.85);
      backdrop-filter: blur(8px);
      border: 2px solid #D4B89A;
      border-radius: 16px;
      padding: 15px;
      box-shadow: 0 8px 32px rgba(107, 74, 42, 0.15);
      text-align: center;
      color: #6B4A2A;
    }

    button {
      background-color: transparent;
      border: 2px solid #BFA07A;
      color: #A07050;
      border-radius: 10px;
      padding: 2px 30px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      outline: none;
    }

    button:hover {
      border-color: #8B5E3C;
      color: #8B5E3C;
      box-shadow: 0 4px 10px rgba(139, 94, 60, 0.15);
    }

    button.active {
      background-color: transparent;
      border-color: #6B4A2A;
      color: #6B4A2A;
    }

    .toggle-group {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 5px;
    }

    .input-container {
      display: none;
    }

    .input-container.active-container {
      display: block;
    }

    #text-input {
      width: 100%;
      background-color: #F5EDE0;
      border: 2px solid #D4B89A;
      color: #6B4A2A;
      border-radius: 12px;
      padding: 10px;
      font-size: 14px;
      outline: none;
    }

    #text-input:focus {
      border-color: #A07050;
    }

    .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: bold;
      color: #A07050;
      display: block;
      margin-bottom: 5px;
    }

    #logs-container {
      text-align: left;
    }

    #logs {
      background-color: rgba(255, 255, 255, 0.5);
      border: 1px solid #D4B89A;
      border-radius: 8px;
      padding: 10px;
      height: 100px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 12px;
      color: #6B4A2A;
    }

    .log-msg {
      margin-bottom: 4px;
    }

    .log-sys {
      color: #A07050;
    }

    .log-data {
      color: #7A5230;
      font-weight: bold;
    }

    .log-err {
      color: #C08040;
    }
  </style>
</head>

<body>

  <svg id="scene-fixed" class="layer-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 576"
    preserveAspectRatio="xMidYMid slice">
    <g id="clouds-bg">
      <!-- Cloud 1 (Medium) -->
      <g class="cloud cloud-1">
        <g transform="translate(0, 40) scale(0.8)">
          <circle cx="40" cy="50" r="30" />
          <circle cx="80" cy="35" r="45" />
          <circle cx="130" cy="40" r="40" />
          <circle cx="175" cy="55" r="25" />
        </g>
      </g>
      <!-- Cloud 2 (Smallest, Slowest) -->
      <g class="cloud cloud-2">
        <g transform="translate(0, 120) scale(0.55)">
          <circle cx="40" cy="50" r="30" />
          <circle cx="80" cy="35" r="45" />
          <circle cx="130" cy="40" r="40" />
          <circle cx="175" cy="55" r="25" />
        </g>
      </g>
    </g>
    <g id="mountains-far"></g>
    <g id="mountains-near"></g>
    <g id="mountains-mid"></g>
    <g id="trees-mid"></g>
    <g id="mountains-front"></g>
    <g id="trees-front"></g>

    <g id="clouds-fg">
      <!-- Cloud 3 (Largest, Fastest, Foreground) -->
      <g class="cloud cloud-3">
        <g transform="translate(0, 10) scale(1.1)">
          <circle cx="40" cy="50" r="30" />
          <circle cx="80" cy="35" r="45" />
          <circle cx="130" cy="40" r="40" />
          <circle cx="175" cy="55" r="25" />
        </g>
      </g>
    </g>

    <!-- Mechanical Hand Character -->
    <g id="mechanical-hand" transform="translate(512, 576) scale(0.6)">
      <!-- Shoulders -->
      <path d="M -140,0 L -140,-50 Q -140,-110 -70,-110 L 70,-110 Q 140,-110 140,-50 L 140,0 Z" fill="#D4B89A" />

      <!-- Neck -->
      <rect x="-40" y="-130" width="80" height="40" rx="5" fill="#6B4A2A" />

      <g id="upper-hand">
        <!-- Fingers -->
        <g id="hand-fingers">
          <!-- Pinky -->
          <g transform="translate(-60, -255) rotate(-20) scale(0.75)">
            <rect x="-6" y="-100" width="12" height="120" rx="6" fill="#6B4A2A" />
            <rect x="-14" y="-35" width="28" height="45" rx="6" fill="#EDD9C5" />
            <rect x="-13" y="-75" width="26" height="35" rx="6" fill="#EDD9C5" />
            <path d="M -12,-80 L 12,-80 L 10,-100 Q 5,-130 0,-130 Q -5,-130 -10,-100 Z" fill="#EDD9C5" />
          </g>
          <!-- Ring -->
          <g transform="translate(-25, -265) rotate(-8) scale(0.9)">
            <rect x="-6" y="-100" width="12" height="120" rx="6" fill="#6B4A2A" />
            <rect x="-14" y="-35" width="28" height="45" rx="6" fill="#EDD9C5" />
            <rect x="-13" y="-75" width="26" height="35" rx="6" fill="#EDD9C5" />
            <path d="M -12,-80 L 12,-80 L 10,-100 Q 5,-130 0,-130 Q -5,-130 -10,-100 Z" fill="#EDD9C5" />
          </g>
          <!-- Middle -->
          <g transform="translate(15, -268) rotate(2) scale(1.0)">
            <rect x="-6" y="-100" width="12" height="120" rx="6" fill="#6B4A2A" />
            <rect x="-14" y="-35" width="28" height="45" rx="6" fill="#EDD9C5" />
            <rect x="-13" y="-75" width="26" height="35" rx="6" fill="#EDD9C5" />
            <path d="M -12,-80 L 12,-80 L 10,-100 Q 5,-130 0,-130 Q -5,-130 -10,-100 Z" fill="#EDD9C5" />
          </g>
          <!-- Index -->
          <g transform="translate(55, -260) rotate(12) scale(0.85)">
            <rect x="-6" y="-100" width="12" height="120" rx="6" fill="#6B4A2A" />
            <rect x="-14" y="-35" width="28" height="45" rx="6" fill="#EDD9C5" />
            <rect x="-13" y="-75" width="26" height="35" rx="6" fill="#EDD9C5" />
            <path d="M -12,-80 L 12,-80 L 10,-100 Q 5,-130 0,-130 Q -5,-130 -10,-100 Z" fill="#EDD9C5" />
          </g>
          <!-- Thumb -->
          <g transform="translate(72, -180) rotate(60) scale(0.9)">
            <rect x="-6" y="-100" width="12" height="120" rx="6" fill="#6B4A2A" />
            <rect x="-14" y="-35" width="28" height="45" rx="6" fill="#EDD9C5" />
            <rect x="-13" y="-75" width="26" height="35" rx="6" fill="#EDD9C5" />
            <path d="M -12,-80 L 12,-80 L 10,-100 Q 5,-130 0,-130 Q -5,-130 -10,-100 Z" fill="#EDD9C5" />
          </g>
        </g>

        <!-- Palm Base -->
        <path d="M -50,-110 L -80,-250 Q -85,-270 -60,-270 L 60,-270 Q 85,-270 80,-250 L 50,-110 Z" fill="#EDD9C5" />

        <!-- Face -->
        <g id="character-face">
          <!-- Eyes -->
          <circle cx="-30" cy="-190" r="4" fill="#6B4A2A" />
          <circle cx="30" cy="-190" r="4" fill="#6B4A2A" />
          <!-- Smile -->
          <path d="M -13,-170 Q 0,-160 13,-170" stroke="#6B4A2A" stroke-width="3" stroke-linecap="round" fill="none" />
        </g>
      </g>
    </g>
  </svg>

  <svg id="scene-stretch" class="layer-svg" xmlns="http://www.w3.org/2000/svg">
    <g id="ground"></g>
  </svg>

  <!-- UI Overlay -->
  <div id="ui-overlay">
    <div class="ui-panel">
      <button id="connect-btn">Select Port</button>
    </div>

    <div class="ui-panel">
      <span class="label">Input Type</span>
      <div class="toggle-group">
        <button id="mode-voice" class="active">Voice</button>
        <button id="mode-text">Text</button>
      </div>

      <!-- Voice Container -->
      <div id="voice-container" class="input-container active-container" style="margin-top: 15px;">
        <button id="toggle-listen">Start Listening</button>
      </div>

      <!-- Text Container -->
      <div id="text-container" class="input-container" style="margin-top: 15px;">
        <input type="text" id="text-input" placeholder="type..." autocomplete="off" />
      </div>
    </div>

    <!-- Logs -->
    <div class="ui-panel" id="logs-container">
      <span class="label">Logs</span>
      <div id="logs"></div>
    </div>
  </div>

  <script>
    const sceneStretch = document.getElementById('scene-stretch');

    // ── Helpers ──────────────────────────────────────────────
    function p(x, y) { return `${x},${y}`; }
    function tri(ax, ay, bx, by, cx, cy) { return `M ${p(ax, ay)} L ${p(bx, by)} L ${p(cx, cy)} Z`; }
    function makePath(d, fill) {
      const el = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      el.setAttribute('d', d);
      el.setAttribute('fill', fill);
      return el;
    }

    const C = {
      cream: '#F5EDE0', blushBeige: '#EDD9C5', warmSand: '#DFC9B0',
      mutedTan: '#D4B89A', softCaramel: '#CCB08A', mediumTan: '#BFA07A',
      goldenTan: '#B8956E', warmAmber: '#C08040', medBrown: '#A07050',
      darkSaddle: '#8B5E3C', deepBrown: '#7A5230', darkest: '#6B4A2A'
    };

    const BASE_W = 1024;
    const BASE_H = 576;

    // ── Mountain Data ─────────────────────────────────────────
    const farMtns = [[0.1, 0.33, -0.1, 0.48], [0.25, 0.27, 0, 0.62], [0.5, 0.08, 0.22, 0.7], [0.61, 0.15, 0.32, 0.86], [0.75, 0.27, 0.58, 1.12], [0.9, 0.25, 0.82, 1.2]];
    const nearMtns = [[0.05, 0.57, -0.18, 0.3], [0.23, 0.39, -0.02, 0.54], [0.44, 0.43, 0.2, 0.65], [0.58, 0.33, 0.34, 0.82], [0.76, 0.47, 0.54, 0.98], [0.91, 0.55, 0.72, 1.1], [1.06, 0.45, 0.9, 1.3]];
    const midMtns = [
      [0.08, 0.62, -0.12, 0.38], [0.20, 0.55, -0.06, 0.62], [0.38, 0.54, -0.14, 0.67],
      [0.55, 0.52, 0.2, 0.9], [0.70, 0.6, 0.50, 1.3], [0.85, 0.58, 0.68, 1.6], [1.00, 0.62, 0.82, 1.18],
    ];
    const frontMtns = [
      [0.05, 0.75, -0.25, 0.40], [0.18, 0.70, -0.12, 0.56], [0.35, 0.73, 0.1, 0.65],
      [0.50, 0.67, 0.22, 0.87], [0.65, 0.72, 0.29, 0.99], [0.80, 0.71, 0.52, 1.20], [0.95, 0.74, 0.68, 1.35],
    ];

    function renderMountains(groupId, mtns, color) {
      const g = document.getElementById(groupId);
      mtns.forEach(([ax, ay, bl, br]) => {
        g.appendChild(makePath(tri(BASE_W * ax, BASE_H * ay, BASE_W * bl, BASE_H, BASE_W * br, BASE_H), color));
      });
    }

    function getMountainEdgeY(mtns, nx) {
      let minY = 1.0;
      for (const [ax, ay, bl, br] of mtns) {
        if (nx < bl || nx > br) continue;
        let y = nx <= ax ? 1.0 + (ay - 1.0) * (nx - bl) / (ax - bl) : ay + (1.0 - ay) * (nx - ax) / (br - ax);
        if (y < minY) minY = y;
      }
      return minY;
    }

    function drawTree(group, x, y, scale, color) {
      const trunkW = 10 * scale;
      const trunkH = 15 * scale;
      const trunk = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      trunk.setAttribute('x', x - trunkW / 2);
      trunk.setAttribute('y', y - trunkH);
      trunk.setAttribute('width', trunkW);
      trunk.setAttribute('height', trunkH);
      trunk.setAttribute('fill', color);
      group.appendChild(trunk);

      for (let i = 0; i < 3; i++) {
        const tierW = (40 - (i * 10)) * scale;
        const tierH = 25 * scale;
        const bottomY = y - trunkH - (i * 15 * scale);
        group.appendChild(makePath(tri(x, bottomY - tierH, x - tierW / 2, bottomY, x + tierW / 2, bottomY), color));
      }
    }

    function renderTreesOnMountains(groupId, mtns, color, count, baseScale, stemOffset) {
      const group = document.getElementById(groupId);
      for (let i = 0; i < count; i++) {
        const nx = (i + 0.5) / count;
        const edgeY = getMountainEdgeY(mtns, nx);
        if (edgeY >= 0.98) continue;
        const scale = baseScale * (0.8 + 0.4 * (((i * 7 + 3) % 5) / 4));
        drawTree(group, BASE_W * nx, BASE_H * (edgeY + stemOffset), scale, color);
      }
    }

    // ── Ground Animation Logic (Solid Geometry) ────────────────
    let leftGroundPath, rightGroundPath;
    let animProgress = 1;

    function initGround(W, H) {
      sceneStretch.setAttribute('viewBox', `0 0 ${W} ${H}`);
      const ground = document.getElementById('ground');
      ground.innerHTML = '';

      // Initialize the empty paths
      leftGroundPath = makePath('', C.blushBeige);
      rightGroundPath = makePath('', C.blushBeige);

      ground.appendChild(leftGroundPath);
      ground.appendChild(rightGroundPath);

      // Render the current state instantly
      updateGroundPaths(W, H, animProgress);
    }

    function updateGroundPaths(W, H, progress) {
      if (!leftGroundPath || !rightGroundPath) return;

      const px = W / 2;
      const py = H;

      // Smooth easing (Cubic Ease In-Out)
      const ease = progress < 0.5 ? 4 * progress * progress * progress : 1 - Math.pow(-2 * progress + 2, 3) / 2;

      // If at the very beginning, draw full screen rectangles with a tiny 1px overlap 
      // in the center so there are no visual hairline cracks before it opens
      if (ease < 0.001) {
        leftGroundPath.setAttribute('d', `M ${px + 1},${py} L 0,${H} L 0,0 L ${px + 1},0 Z`);
        rightGroundPath.setAttribute('d', `M ${px - 1},${py} L ${W},${H} L ${W},0 L ${px - 1},0 Z`);
        return;
      }

      // Calculate the angles. It starts pointing straight up (-PI/2) and sweeps outward.
      const startAngle = -Math.PI / 2;

      // Calculate the final resting angles of your specific valley triangles
      const targetAngleLeft = Math.atan2((H * 0.6) - py, 0 - px);
      const targetAngleRight = Math.atan2((H * 0.55) - py, W - px);

      const angleLeft = startAngle + ease * (targetAngleLeft - startAngle);
      const angleRight = startAngle + ease * (targetAngleRight - startAngle);

      // --- Left Curtain Math ---
      let dLeft = "";
      // Find where the sweeping line intersects the top edge of the screen
      let x_top = px - py * (Math.cos(angleLeft) / Math.sin(angleLeft));

      if (x_top >= 0) {
        // If the line hits the top edge, the shape covers the bottom left corner up to the top
        dLeft = `M ${px},${py} L 0,${H} L 0,0 L ${x_top},0 Z`;
      } else {
        // If the line swings past the top left corner, it now hits the left wall
        let y_left = py - px * (Math.sin(angleLeft) / Math.cos(angleLeft));
        dLeft = `M ${px},${py} L 0,${H} L 0,${y_left} Z`;
      }

      // --- Right Curtain Math ---
      let dRight = "";
      let x_top_r = px - py * (Math.cos(angleRight) / Math.sin(angleRight));

      if (x_top_r <= W) {
        // Hits top edge
        dRight = `M ${px},${py} L ${W},${H} L ${W},0 L ${x_top_r},0 Z`;
      } else {
        // Hits right edge
        let y_right = py + (W - px) * (Math.sin(angleRight) / Math.cos(angleRight));
        dRight = `M ${px},${py} L ${W},${H} L ${W},${y_right} Z`;
      }

      // Update the SVG attributes directly
      leftGroundPath.setAttribute('d', dLeft);
      rightGroundPath.setAttribute('d', dRight);
    }

    function playAnimation() {
      const duration = 1000; // 2.2 seconds 
      const startTime = performance.now();

      function step(time) {
        const elapsed = time - startTime;
        animProgress = Math.min(elapsed / duration, 1);

        updateGroundPaths(window.innerWidth, window.innerHeight, animProgress);

        if (animProgress < 1) {
          requestAnimationFrame(step);
        }
      }
      requestAnimationFrame(step);
    }

    // ── Init ───────────────────────────────────────────────────
    renderMountains('mountains-far', farMtns, C.warmSand);
    renderMountains('mountains-near', nearMtns, C.mutedTan);
    renderMountains('mountains-mid', midMtns, C.mediumTan);
    renderTreesOnMountains('trees-mid', midMtns, C.mediumTan, 18, 0.55, 0.01);
    renderMountains('mountains-front', frontMtns, C.goldenTan);
    renderTreesOnMountains('trees-front', frontMtns, C.goldenTan, 20, 0.65, 0.005);

    // Set up the scene
    initGround(window.innerWidth, window.innerHeight);

    // Keep the geometric math responsive to window resizing
    window.addEventListener('resize', () => {
      initGround(window.innerWidth, window.innerHeight);
    });

    // Face follows cursor
    const characterFace = document.getElementById('character-face');
    document.addEventListener('mousemove', (e) => {
      if (!characterFace) return;

      const xPercent = e.clientX / window.innerWidth;
      const yPercent = e.clientY / window.innerHeight;

      // Shift face smoothly by up to max 12.5px in any direction
      const dx = (xPercent - 0.5) * 25;
      const dy = (yPercent - 0.5) * 25;

      characterFace.setAttribute('transform', `translate(${dx}, ${dy})`);
    });

    // ── UI Integration Logic ─────────────────────────────────
    let port, writer, reader;
    let isListening = false;
    let currentMode = 'voice';
    let isSigning = false;
    let resolveCurrentSign = null;

    const COMMANDS = ['open', 'spread', 'fist', 'point', 'thumbs up'];
    const encoder = new TextEncoder();

    function setInputLocked(locked) {
      textInput.disabled = locked;
      toggleListenBtn.disabled = locked;
    }

    async function startReader() {
      const decoder = new TextDecoder();
      let buffer = '';
      try {
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value);
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            const trimmed = line.trim();
            logMessage(`Arduino: ${trimmed}`, 'data');
            if (trimmed === 'DONE' && resolveCurrentSign) {
              resolveCurrentSign();
              resolveCurrentSign = null;
            }
          }
        }
      } catch (e) {
        logMessage('Reader error: ' + e.message, 'err');
      }
    }

    async function sendAndWait(command) {
      return new Promise((resolve) => {
        resolveCurrentSign = resolve;
        writer.write(encoder.encode(command + "\n"));
      });
    }

    function parseTokens(text) {
      const tokens = [];
      const words = text.split(/\s+/).filter(Boolean);
      let i = 0;
      while (i < words.length) {
        let matched = false;
        for (let len = words.length - i; len > 1; len--) {
          const phrase = words.slice(i, i + len).join(' ');
          if (COMMANDS.includes(phrase)) {
            tokens.push(phrase);
            i += len;
            matched = true;
            break;
          }
        }
        if (!matched) {
          if (COMMANDS.includes(words[i])) {
            tokens.push(words[i]);
          } else {
            for (const ch of words[i].toUpperCase()) {
              if (/[A-Z]/.test(ch)) tokens.push(ch);
            }
          }
          i++;
        }
      }
      return tokens;
    }

    async function signText(text) {
      if (!writer) {
        logMessage("Not connected to Arduino", 'err');
        return;
      }
      isSigning = true;
      setInputLocked(true);
      const tokens = parseTokens(text);
      for (const token of tokens) {
        logMessage(COMMANDS.includes(token) ? `Signing command: "${token}"` : `Signing letter: "${token}"`, 'sys');
        await sendAndWait(token);
      }
      isSigning = false;
      setInputLocked(false);
    }

    const logsEl = document.getElementById('logs');
    function logMessage(msg, type = 'sys') {
      const el = document.createElement('div');
      el.className = `log-msg log-${type}`;
      el.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logsEl.appendChild(el);
      logsEl.scrollTop = logsEl.scrollHeight;
    }

    logMessage('System Initialized. Waiting for connection...', 'sys');

    // Port Connection
    document.getElementById('connect-btn').onclick = async () => {
      try {
        port = await navigator.serial.requestPort();
        await port.open({ baudRate: 9600 });
        writer = port.writable.getWriter();
        reader = port.readable.getReader();
        startReader();
        logMessage("Arduino Connected Successfully", 'sys');
        document.getElementById('connect-btn').innerText = "Connected";
        document.getElementById('connect-btn').classList.add('active');
      } catch (err) {
        logMessage("Connection Error: " + err.message, 'err');
      }
    };

    // Toggle Modes
    const btnVoice = document.getElementById('mode-voice');
    const btnText = document.getElementById('mode-text');
    const containerVoice = document.getElementById('voice-container');
    const containerText = document.getElementById('text-container');

    function setMode(mode) {
      currentMode = mode;
      if (mode === 'voice') {
        btnVoice.classList.add('active');
        btnText.classList.remove('active');
        containerVoice.classList.add('active-container');
        containerText.classList.remove('active-container');
      } else {
        btnText.classList.add('active');
        btnVoice.classList.remove('active');
        containerText.classList.add('active-container');
        containerVoice.classList.remove('active-container');
      }
    }

    btnVoice.onclick = () => setMode('voice');
    btnText.onclick = () => setMode('text');

    // Text Output
    const textInput = document.getElementById('text-input');
    textInput.addEventListener('keypress', async (e) => {
      if (e.key === 'Enter' && !isSigning) {
        const val = textInput.value.trim().toLowerCase();
        if (val) {
          logMessage(`Text typed: "${val}"`, 'data');
          textInput.value = '';
          await signText(val);
        }
      }
    });

    // Voice recognition
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.continuous = false;
    recognition.lang = 'en-US';

    recognition.onresult = async (event) => {
      const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
      logMessage(`Heard: "${transcript}"`, 'data');
      isListening = false;
      updateVoiceToggle();
      await signText(transcript);
    };

    recognition.onend = () => {
      isListening = false;
      updateVoiceToggle();
    };

    const toggleListenBtn = document.getElementById('toggle-listen');
    function updateVoiceToggle() {
      if (isListening) {
        toggleListenBtn.innerText = "Stop Listening";
        toggleListenBtn.classList.add('active');
      } else {
        toggleListenBtn.innerText = "Start Listening";
        toggleListenBtn.classList.remove('active');
      }
    }

    toggleListenBtn.onclick = () => {
      if (isSigning) return;
      isListening = !isListening;
      if (isListening) {
        try {
          recognition.start();
          logMessage("Started listening...", 'sys');
        } catch (e) {
          logMessage("Speech Recognition Error: " + e.message, 'err');
          isListening = false;
        }
      } else {
        recognition.stop();
        logMessage("Stopped listening.", 'sys');
      }
      updateVoiceToggle();
    };

  </script>
</body>

</html>
